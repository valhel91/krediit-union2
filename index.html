<!DOCTYPE html>
<html>
<head>
    <title>Krediit Union 2</title>
    <script async src="https://api.beta.glia.com/salemove_integration.js"></script>
</head>
<body>
    <h1>Hello World Helen 2</h1>
    
    <button id="button1" class="button">Contact Us</button>
    <button id="button2" class="button">Sign Up</button>

    <script>
        /**
         * Since the script is async, we use sm.getApi 
         * which waits for the Glia library to be ready.
         */
        window.onload = function() {
            if (window.sm) {
                sm.getApi({version: 'v1'}).then(function(glia) {
                    console.log("Glia initialized on Site 2");

                    // 1. Setup the "Sign Up" button event
                    const signUpBtn = document.querySelector('#button2');
                    if (signUpBtn) {
                        signUpBtn.addEventListener('click', function() {
                            // Record the custom event
                            glia.recordEvent({message: 'Visitor wants to sign up on Site 2'});
                            // Optional: Request engagement automatically
                            // glia.requestEngagement('text');
                        });
                    }

                    // 2. Setup the "Contact Us" button event
                    const contactBtn = document.querySelector('#button1');
                    if (contactBtn) {
                        contactBtn.addEventListener('click', function() {
                            glia.requestEngagement('text');
                        });
                    }
                }).catch(function(error) {
                    console.error("Glia failed to load:", error);
                });
            }
        };
    </script>
</body>
</html>
